# infra/searxng/searxng/settings.yml
# Minimal SearXNG config for Aether web_search tool.
# JSON output format is enabled so the tool can parse results machine-readably.
use_default_settings: true

server:
  secret_key: "aether-local-dev-secret-change-in-production"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

search:
  safe_search: 0
  default_lang: ""

outgoing:
  request_timeout: 6.0
  max_request_timeout: 10.0

formats:
  - html
  - json
