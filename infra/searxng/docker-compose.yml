# SearXNG for Aether web_search tool. Not started by `npm run dev`.
# Bring it up manually: docker compose -f infra/searxng/docker-compose.yml up -d
services:
  searxng:
    image: searxng/searxng:latest
    container_name: aether-searxng
    ports:
      - '8080:8080'
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - UWSGI_WORKERS=4
    restart: unless-stopped
